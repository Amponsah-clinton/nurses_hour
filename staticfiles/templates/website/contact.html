{% extends 'base.html' %}
{% load static %}
{% block title %}Contact – NurseHour{% endblock %}
{% block extra_css %}
<style>
.contact-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; background-color: #fafaf9; }
.contact-wrap { width: 100%; max-width: 520px; margin: 0 auto; }
.contact-card { background: #ffffff; border: 1px solid #e5e5e5; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
.contact-card__head { padding: 28px 32px 24px; border-bottom: 1px solid #e5e5e5; }
.contact-card__head h1 { margin: 0; font-size: 1.5rem; font-weight: 700; color: #1c1917; letter-spacing: -0.02em; }
.contact-card__head p { margin: 6px 0 0; font-size: 0.95rem; color: #57534e; }
.contact-card__body { padding: 28px 32px 32px; }
.contact-form .form-group { margin-bottom: 1.25rem; }
.contact-form label { display: block; font-weight: 600; font-size: 0.9rem; color: #1c1917; margin-bottom: 0.4rem; }
.contact-form .form-control { width: 100%; padding: 0.75rem 1rem; font-size: 1rem; border: 1px solid #d6d3d1; border-radius: 10px; background: #fff; transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit; }
.contact-form .form-control:focus { outline: 0; border-color: #232637; box-shadow: 0 0 0 3px rgba(35,38,55,0.12); }
.contact-form .form-control::placeholder { color: #a8a29e; }
.contact-form textarea.form-control { min-height: 140px; resize: vertical; }
.contact-form .btn-submit { width: 100%; padding: 0.85rem 1.5rem; font-size: 1rem; font-weight: 600; color: #fff; background: #232637; border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.contact-form .btn-submit:hover { background: #1a1c28; transform: translateY(-1px); }
.contact-form .btn-submit:active { transform: translateY(0); }
@media (max-width: 576px) {
    .contact-page { padding: 1.5rem 1rem; }
    .contact-card__head, .contact-card__body { padding-left: 1.5rem; padding-right: 1.5rem; }
}
</style>
{% endblock %}
{% block content %}
<section class="contact-page">
    <div class="container">
        <div class="contact-wrap">
            <div class="contact-card">
                <div class="contact-card__head">
                    <h1>Get in touch</h1>
                    <p>Send us a message and we’ll get back to you as soon as we can.</p>
                </div>
                <div class="contact-card__body">
                    <form action="{% url 'website:contact_submit' %}" method="post" class="contact-form">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="id_name">Name <span style="color:#dc2626;">*</span></label>
                            <input type="text" name="name" id="id_name" class="form-control" placeholder="Your name" required maxlength="255" value="{{ request.POST.name|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label for="id_email">Email <span style="color:#dc2626;">*</span></label>
                            <input type="email" name="email" id="id_email" class="form-control" placeholder="you@example.com" required value="{{ request.POST.email|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label for="id_subject">Subject</label>
                            <input type="text" name="subject" id="id_subject" class="form-control" placeholder="What is this about?" maxlength="255" value="{{ request.POST.subject|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label for="id_message">Message <span style="color:#dc2626;">*</span></label>
                            <textarea name="message" id="id_message" class="form-control" placeholder="Your message..." required>{{ request.POST.message|default:'' }}</textarea>
                        </div>
                        <button type="submit" class="btn-submit">Send message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
